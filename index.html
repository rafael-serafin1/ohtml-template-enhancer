<!-- This is a simple oHTML framework usage -->
<!-- Creativity is the limit                -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!-- import oHTML framework core -->
        <!-- must be module type         -->
        <script type="module" src="core/runtime.js"></script>

        <!-- sample model - 
        <user-card name="<h2></h2>" email="<p></p>"> </user-card> 
        -->

        <!-- template define a custom HTML tag -->
        <!-- template's id defines custom tag's name -->
        <!-- data-bind content will replace with bound data -->
        <!-- class-pointer allows dynamic class assignment from component attributes -->
        <!-- data-use-shadow="false" is needed for external CSS classes to work -->
        <template id="user-card" data-use-shadow="false">
            <div class="main-user-card">
                <h1 data-bind="name" id-pointer="name-id" class-pointer="user-name"></h1>
                <p data-bind="email" id-pointer="email-id" class-pointer="user-email"></p>
                <b><p data-bind="age" id-pointer="age-id" class-pointer="user-age"></p></b>
                <p data-bind="bio" id-pointer="bio-id" class-pointer="user-bio"></p>
            </div>
        </template>

        <template id="triple-div">
            <div>
                <div>
                    <div>
                        <slot></slot>
                    </div>
                </div>
            </div>
        </template>

        <main>
            <section>
                <div>
                    <user-card name="Rafael Engel Serafin" 
                        email="Email: rafael@gmail.com" 
                        age="19 years old" 
                        bio="Computer Science student focused on software development and innovation"
                        user-name="user-name-style"
                        user-email="user-email-style"
                        user-age="user-age-style"
                        user-bio="user-bio-style"
                        name-id="name-id-1"
                        email-id="email-id-1"
                        age-id="age-id-1"
                        bio-id="bio-id-1">
                    </user-card>
                </div>
                <triple-div>
                    <p>This is a paragraph inside the triple-div.</p>
                </triple-div>
            </section>
            <section>
                <div>
                    <user-card name="John Doe"
                    email="Email: john.doe@gmail.com"
                    age="25 years old"
                        bio="Software engineer with a passion for creating innovative solutions"
                        user-name="user-name-style"
                        user-email="user-email-style"
                        user-age="user-age-style"
                        user-bio="user-bio-style">
                    </user-card>
                </div>
                <triple-div>
                    <p>This is another paragraph inside the triple-div.</p>
                </triple-div>
            </section>
        </main>

    </body>
</html>
