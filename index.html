<!-- This is a simple oHTML template enhancer usage -->
<!-- Creativity is the limit                -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!-- import oHTML template enhancer core -->
        <!-- must be module type         -->
        <script type="module" src="core/runtime.js"></script>

        <!-- sample model - 
        <user-card name="<h2></h2>" email="<p></p>"> </user-card> 
        -->

        <!-- template define a custom HTML tag -->
        <!-- template's id defines custom tag's name -->
        <!-- data-bind content will replace with bound data -->
        <!-- class-pointer allows dynamic class assignment from component attributes -->
        <!-- data-use-shadow="false" is needed for external CSS classes to work -->
        <template id="user-card" data-use-shadow="false">
            <div class="main-user-card">
                <h1 data-bind="name" id-pointer="name-id" class-pointer="user-name"></h1>
                <p data-bind="email" id-pointer="email-id" class-pointer="user-email"></p>
                <b><p data-bind="age" id-pointer="age-id" class-pointer="user-age"></p></b>
                <p data-bind="bio" id-pointer="bio-id" class-pointer="user-bio"></p>
                <p data-bind="logged" o-if="active" style="color: green; font-weight: bold;"></p>
            </div>
        </template>

        <template id="triple-div">
            <div>
                <div>
                    <div>
                        <slot></slot>
                    </div>
                </div>
            </div>
        </template>

        <template id="user-list" data-use-shadow="false">
            <ul>
                <li o-for="user in users" class="user-item">
                    <h3 data-bind="user.name" style="margin: 0;"></h3>
                    <p data-bind="user.email" style="margin: 5px 0; color: #666;"></p>
                </li>
            </ul>
        </template>

        <main>
            <section>
                <div>
                    <user-card name="Rafael Engel Serafin" 
                        email="Email: rafael@gmail.com" 
                        age="19 years old" 
                        bio="Computer Science student focused on software development and innovation"
                        logged="✓ User is logged in"
                        user-name="user-name-style"
                        user-email="user-email-style"
                        user-age="user-age-style"
                        user-bio="user-bio-style"
                        name-id="user-rafael"
                        :email-id="123456"
                        age-id="age-rafael"
                        :active="true">
                    </user-card>
                </div>
                <triple-div>
                    <p>This is a paragraph inside the triple-div.</p>
                </triple-div>
            </section>
            <section>
                <div>
                    <user-card name="John Doe"
                        email="Email: john.doe@gmail.com"
                        age="25 years old"
                        bio="Software engineer with a passion for creating innovative solutions"
                        logged="✓ User is logged in"
                        user-name="user-name-style"
                        user-email="user-email-style"
                        user-age="user-age-style"
                        user-bio="user-bio-style"
                        name-id="user-john"
                        :email-id="789012"
                        age-id="age-john"
                        active="false"  
                        :metadata="{\"role\": \"engineer\", \"level\": 5}">
                    </user-card>
                    <!-- active without ':' prefix recives string value-->
                    <!-- causes error -->
                </div>
                <triple-div>
                    <p>This is another paragraph inside the triple-div.</p>
                </triple-div>
            </section>
        </main>

        <!-- o-for usage example -->
        <div style="margin-top: 50px; padding: 20px; background: #f5f5f5;">
            <h2>User List Example (o-for)</h2>
            <user-list :users='[
                {"name": "Rafael Engel", "email": "rafael@gmail.com"},
                {"name": "Daniel Dias", "email": "daniel@gmail.com"},
                {"name": "João Silva", "email": "joao@gmail.com"},
                {"name": "Maria Santos", "email": "maria@gmail.com"}
            ]'></user-list>
        </div>

    </body>
</html>
