<!-- This is a simple oHTML template enhancer usage -->
<!-- Creativity is the limit                -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!-- import oHTML template enhancer core -->
        <!-- must be module type         -->
        <script type="module" src="core/runtime.js"></script>

        <!-- sample model - 
        <user-card name="<h2></h2>" email="<p></p>"> </user-card> 
        -->

        <!-- template define a custom HTML tag -->
        <!-- template's id defines custom tag's name -->
        <!-- data-bind content will replace with bound data -->
        <!-- class-pointer allows dynamic class assignment from component attributes -->
        <!-- data-use-shadow="false" is needed for external CSS classes to work -->
        <template id="user-card" data-use-shadow="false">
            <div class="main-user-card">
                <h1 data-bind="name" id-pointer="name-id" attr-pointer="name-style, name-title"></h1>
                <p data-bind="email" id-pointer="email-id" attr-pointer="email-style, email-title"></p>
                <b><p data-bind="age" id-pointer="age-id" attr-pointer="age-style"></p></b>
                <p data-bind="bio" id-pointer="bio-id" attr-pointer="bio-style"></p>
            </div>
        </template>

        <template id="triple-div">
            <div>
                <slot></slot>
            </div>
        </template>

        <template id="user-list" data-use-shadow="false">
            <ul>
                <li o-for="user in users" class="user-item" attr-pointer="user.styling">
                    <h3 data-bind="user.name" style="margin: 0;"></h3>
                    <p data-bind="user.email" style="margin: 5px 0; color: #666;"></p>
                </li>
            </ul>
        </template>

        <main>
            <section>
                <div>
                    <user-card 
                        name="Rafael Engel Serafin" 
                        email="rafael@gmail.com" 
                        age="19 years old" 
                        bio="Computer Science student"
                        name-style="color: #2563eb; font-weight: bold;"
                        name-title="Full Stack Developer"
                        email-style="color: #10b981; font-weight: bold;"
                        email-title="Email do usuário"
                        age-style="color: #f59e0b;"
                        bio-style="color: #666; font-size: 14px;">
                    </user-card>
                </div>
            </section>
            <section>
                <div>
                    <user-card 
                        name="John Doe"
                        email="john.doe@gmail.com"
                        age="25 years old"
                        bio="Software engineer with passion for innovation"
                        name-style="color: #dc2626; font-weight: bold;"
                        name-title="Backend Developer"
                        email-style="color: #7c3aed; font-style: italic;"
                        email-title="Email do desenvolvedor"
                        age-style="color: #059669;"
                        bio-style="color: #666; font-size: 14px;">
                    </user-card>
                </div>
            </section>
        </main>

        <!-- o-for usage example -->
        <div style="margin-top: 50px; padding: 20px; background: #f5f5f5;">
            <h2>User List Example (using o-for and attr-pointer)</h2>
            <!-- Example: Object format for attr-pointer with o-for -->
            <h3>Dynamic attributes with o-for loop</h3>
            <user-list :users='[
                {"name": "Rafael Engel", "email": "rafael@gmail.com", "styling": {"style": "color: #2563eb; font-weight: bold;", "title": "Full Stack Developer"}},
                {"name": "Daniel Dias", "email": "daniel@gmail.com", "styling": {"style": "color: #dc2626; font-weight: bold;", "title": "Backend Developer"}},
                {"name": "João Silva", "email": "joao@gmail.com", "styling": {"style": "color: #059669; font-weight: bold;", "title": "Frontend Developer"}},
                {"name": "Maria Santos", "email": "maria@gmail.com", "styling": {"style": "color: #7c3aed; font-weight: bold;", "title": "QA Engineer"}}
            ]'></user-list>
        </div>

    </body>
</html>
